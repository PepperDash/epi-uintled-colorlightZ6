name: Branch Build

on:
  push:
    branches:
      - feature/*

jobs:
  build_project:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - run: Get-Location
      - run: docker run --rm pepperdash/sspbuilder c:\cihelpers\vsidebuild.exe -Solution "$($Env.GITHUB_WORKSPACE)\pepperdash-generic-colorlightz6-epi\pepperdash-generic-colorlightz6-epi.sln" -BuildAll
