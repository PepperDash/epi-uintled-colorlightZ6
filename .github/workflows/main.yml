name: Branch Build

on:
  push:
    branches:
      - feature/*

env:
  # solution path doesn't need slashes unless there it is multiple folders deep
  SOLUTION_PATH: pepperdash-generic-colorlightz6-epi
  SOLUTION_FILE: pepperdash-generic-colorlightz6-epi.sln
  VERSION: 0.0.0-buildtype-buildnumber
jobs:
  build_project:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Checkout submodules
        shell: bash
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          auth_header="$(git config --local --get http.https://github.com/.extraheader)"
          git submodule sync --recursive
          git -c "http.extraheader=$auth_header" -c protocol.version=2 submodule update --init --force --recursive --depth=1
      #- run: Write-Output "c:\project\$($Env:SOLUTION_PATH)\$($Env:SOLUTION_FILE)"
      - name: Set Version Number
        shell: powershell
        run: |
          $version = ./.github/scripts/GenerateVersionNumber.ps1
          Write-Output "::set-env name=VERSION::$version"
      - name: Update AssemblyInfo.cs
        shell: powershell
        run: |
          Write-Output ${{ env.VERSION }}
          ./.github/scripts/UpdateAssemblyVersion.ps1 ${{ env.VERSION }}
      - name: Build Solution
        shell: powershell
        run: |
          Invoke-Expression "docker run --rm --mount type=bind,source=""$($Env:GITHUB_WORKSPACE)"",target=""c:/project"" pepperdash/sspbuilder c:\cihelpers\vsidebuild.exe -Solution ""c:\project\$($Env:SOLUTION_PATH)\$($Env:SOLUTION_FILE)"" -BuildAll"
          ./.github/scripts/ZipBuildOutput.ps1
      - name: Upload Artifact
        uses: actions/upload-artifact@v1
        with:
          name: Build
          path: ${{ env.GITHUB_WORKSPACE}}\output.zip