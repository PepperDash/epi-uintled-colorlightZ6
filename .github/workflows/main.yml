name: Branch Build

on:
  push:
    branches:
      - feature/*

jobs:
  build_project:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - run: docker run --rm --mount type=bind,source="c:/Essentials/",target="c:/project" sspbuilder:v1.0 c:\cihelpers\vsidebuild.exe -Solution "c:\project\pepperdash-generic-colorlightZ6-epi.sln" -BuildAll
