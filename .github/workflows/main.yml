name: Branch Build

on:
  push:
    branches:
      - feature/*

jobs:
  build_project:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - run: Get-Location
      - run: docker run --rm --mount type=bind,source="$($Env:workspace)",target="c:/project" sspbuilder:v1.0 c:\cihelpers\vsidebuild.exe -Solution "c:\project\pepperdash-generic-colorlightz6-epi.sln" -BuildAll
        shell: powershell
        env:
            workspace: ${{ env.GITHUB_WORKSPACE }}
