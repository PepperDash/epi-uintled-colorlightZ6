name: Branch Build

on:
  push:
    branches:
      - feature/*

jobs:
  build_project:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
        with:
            fetch-depth: 0
      - name: Checkout submodules
        shell: bash
        run: |
             # If your submodules are configured to use SSH instead of HTTPS please uncomment the following line
             git config --global url."https://github.com/".insteadOf "git@github.com:"
             auth_header="$(git config --local --get http.https://github.com/.extraheader)"
             git submodule sync --recursive
             git -c "http.extraheader=$auth_header" -c protocol.version=2 submodule update --init --force --recursive --depth=1
      - run: Write-Output "$($Env:GITHUB_WORKSPACE)"
      - run: Invoke-Expression "dir $($Env:GITHUB_WORKSPACE)"
      - run: Invoke-Expression "docker run --rm --mount type=bind,source=""$($Env:GITHUB_WORKSPACE)"",target=""c:/project"" pepperdash/sspbuilder c:\cihelpers\vsidebuild.exe -Solution ""c:\project\pepperdash-generic-colorlightz6-epi\pepperdash-generic-colorlightz6-epi.sln"" -BuildAll"

